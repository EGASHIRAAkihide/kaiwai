name: kaiwai
description: KAIWAI - A location-based community hub for fitness enthusiasts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:   # i18n — built into the Flutter SDK
    sdk: flutter

  # Maps (OpenStreetMap — no API key required)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^13.0.1

  # Backend
  supabase_flutter: ^2.8.0

  # UI
  google_fonts: ^6.2.1

  # i18n / l10n
  intl: ^0.20.2           # Date/number formatting + ARB message parsing

  # Timezone-aware time display (nomad local time per spot)
  timezone: ^0.9.4        # IANA timezone DB; call initializeTimeZones() in main()

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
